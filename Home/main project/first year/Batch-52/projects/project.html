<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Project Details</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />

  <!-- Site CSS -->
  <link rel="stylesheet" href="nav_foot.css" />
  <link rel="stylesheet" href="project.css" />

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="project1.css">
</head>

<body>

<main class="container my-5">

  <!-- Navbar -->
  <header class="site-header" aria-label="Top Navigation">
    <div id="navbar"></div>
  </header>

  <!-- Title -->
  <section class="text-center mb-5">
    <h1 id="project-title" class="fw-bold"></h1>
    <p id="project-short-desc" class="lead"></p>
  </section>

  <!-- Buttons -->
  <div class="text-center mb-5">
    <a id="github-btn" target="_blank" class="btn btn-dark d-none">
      <i class="fa fa-github me-2"></i> View on GitHub
    </a>

    <a id="report-btn" target="_blank" class="btn btn-primary ms-3 d-none">
      View Report
    </a>
  </div>

  <!-- Two-column layout -->
  <section class="mb-5">
    <div class="row align-items-start">

      <!-- LEFT COLUMN -->
      <div class="col-lg-7 col-md-12">

        <div class="mb-5">
          <h3 class="section-title">Introduction</h3>
          <p id="introduction"></p>
        </div>

        <div class="mb-5">
          <h3 class="section-title">Problem Statement</h3>
          <p id="problem"></p>
        </div>

        <div class="mb-5">
          <h3 class="section-title">Features</h3>
          <ul id="features-list"></ul>
        </div>

        <div class="mb-5">
          <h3 class="section-title">Tools & Technology</h3>
          <ul id="tools-list"></ul>
        </div>

        <div class="mb-5">
          <h3 class="section-title">Impact</h3>
          <p id="impact"></p>
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="col-lg-5 col-md-12 text-center" id="image-container">
        <!-- Images inserted dynamically -->
      </div>

    </div>
  </section>

  <hr class="section-divider">

  <!-- Supervisor -->
  <section class="mb-5">
    <h3 class="section-title center-title">Supervisor</h3>
    <div id="supervisor-container" class="row justify-content-center"></div>
  </section>

  <!-- Team -->
  <section class="mb-5">
    <h3 class="section-title center-title">Team Members</h3>
    <div id="team-container" class="row g-4 justify-content-center"></div>
  </section>

</main>

<!-- Footer -->
<div id="footer"></div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ---------------- Navbar & Footer ---------------- */
fetch('navbar.html')
  .then(res => res.text())
  .then(html => document.getElementById('navbar').innerHTML = html);

fetch('footer.html')
  .then(res => res.text())
  .then(html => document.getElementById('footer').innerHTML = html);


/* ---------------- Load Project Data ---------------- */

const params = new URLSearchParams(window.location.search);
const projectId = params.get("id");

if (!projectId) {
  document.getElementById("project-title").innerText = "Project Not Found";
} else {

  fetch(`http://localhost:8000/projects/${projectId}`)
    .then(res => res.json())
    .then(data => {

      document.title = data.title;
      document.getElementById("project-title").innerText = data.title;
      document.getElementById("project-short-desc").innerText = data.short_description || "";

      document.getElementById("introduction").innerText = data.introduction || "";
      document.getElementById("problem").innerText = data.problem_statement || "";
      document.getElementById("impact").innerText = data.impact || "";

      /* GitHub */
      if (data.github_url) {
        const githubBtn = document.getElementById("github-btn");
        githubBtn.href = data.github_url;
        githubBtn.classList.remove("d-none");
      }

      /* Report */
      if (data.report_url) {
        const reportBtn = document.getElementById("report-btn");
        reportBtn.href = data.report_url;
        reportBtn.classList.remove("d-none");
      }

      /* Features */
      if (data.features) {
        const ul = document.getElementById("features-list");
        data.features.forEach(f => {
          ul.innerHTML += `<li>${f}</li>`;
        });
      }

      /* Tools */
      if (data.tools) {
        const ul = document.getElementById("tools-list");
        data.tools.forEach(t => {
          ul.innerHTML += `<li>${t}</li>`;
        });
      }

      /* Images */
      if (data.images) {
        const container = document.getElementById("image-container");
        data.images.forEach(img => {
          container.innerHTML += `
            <img src="${img}" class="project-image mb-3" alt="Project Image">
          `;
        });
      }

      /* Supervisor */
      if (data.supervisor) {
        document.getElementById("supervisor-container").innerHTML = `
          <div class="col-md-3">
            <div class="card shadow-sm text-center">
              <div class="card-body">
                <p><strong>${data.supervisor.name}</strong></p>
                <p>Email: ${data.supervisor.email || ""}</p>
              </div>
            </div>
          </div>
        `;
      }

      /* Team */
      if (data.team) {
        const container = document.getElementById("team-container");
        data.team.forEach(member => {
          container.innerHTML += `
            <div class="col-md-3">
              <div class="card shadow-sm text-center">
                <div class="card-body">
                  <p><strong>${member.name}</strong></p>
                  <p>Email: ${member.email || ""}</p>
                </div>
              </div>
            </div>
          `;
        });
      }

    })
    .catch(err => {
      document.getElementById("project-title").innerText = "Project Not Found";
      console.error(err);
    });
}

</script>

</body>
</html>
